name: codeql

# Security analysis for Python (backend) and JavaScript / TypeScript
# (frontend). Runs on every PR, every push to main, and a weekly
# cron so new advisories surface even without code activity.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1" # Monday 07:23 UTC — off-peak.

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ``javascript-typescript`` covers both .js and .ts/.tsx.
        # ``python`` covers backend/. Each runs as a separate job
        # so the matrix can re-run one language without redoing
        # the other.
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # ``config-file`` carries the suite selection plus a
          # ``paths-ignore`` list. The suite is still
          # ``security-and-quality``; the config additionally
          # excludes alembic migrations (~100 false-positive
          # ``unused-global-variable`` alerts on alembic's
          # ``revision`` / ``down_revision`` / ``branch_labels`` /
          # ``depends_on`` module constants).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
