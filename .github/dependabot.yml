version: 2

updates:
  # ── Backend (Python) ─────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    # Group dev tools together so we get one PR per week for
    # them rather than one per package.
    groups:
      backend-dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "types-*"
      backend-runtime:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "gunicorn"
          - "pydantic*"
          - "sqlalchemy*"
          - "alembic"
          - "httpx"
          - "redis"
          - "arq"
          - "structlog"
          - "typer"
          - "jinja2"

  # ── Frontend (npm) ───────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    # Framework-major bumps (React 19, Tailwind 4, Vite 8,
    # react-router 7, eslint 10, …) are migrations, not
    # one-click updates — landing one needs a deliberate
    # planning pass, a peer-dep audit, and usually a test
    # suite tweak. Block dependabot from auto-proposing them
    # so the weekly cycle stays focused on safe-to-merge
    # patches + minors. Re-evaluate when scheduling each
    # migration.
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        # ``@eslint/js`` ships in lockstep with ``eslint`` and has a
        # peerOptional dep on the same major. Bumping it alone
        # breaks ``npm ci`` against the eslint@9 we're pinned at.
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-types-and-tools:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "vite*"
          - "vitest*"
          - "@vitejs/*"
          - "@playwright/*"
      frontend-runtime:
        patterns:
          - "react*"
          - "react-dom"
          - "@tanstack/*"
          - "zustand"
          - "react-router*"
          - "axios"
          - "tailwindcss"

  # ── GitHub Actions ───────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci

  # ── Docker base image ────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
