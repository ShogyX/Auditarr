[alembic]
# %(here)s interpolates to the directory of this alembic.ini, so
# these paths resolve correctly regardless of the caller's cwd.
# Previously these were bare ``migrations`` and ``.`` which only
# worked when alembic was invoked with cwd == backend/.
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
version_path_separator = os
sqlalchemy.url = driver://user:pass@host/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
